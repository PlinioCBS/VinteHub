services:
  - type: web
    name: vinte-hub-backend
    runtime: node
    buildCommand: npm install && cd frontend && npm install --include=dev && npm run build && cd ..
    startCommand: node server.js
    plan: free
    disk:
      name: vinte-hub-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/crm.db
      - key: UPLOADS_PATH
        value: /data/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
